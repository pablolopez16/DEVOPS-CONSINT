
name: localstack-cicd

on:
  push:
    branches:
      - main

jobs:
  localstack-cicd:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'test')

    services:
      localstack:
        image: localstack/localstack:latest
        ports:
          - "4566:4566"
        env:
          SERVICES: s3,sqs
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
        AWS_ACCESS_KEY_ID: test
        AWS_SECRET_ACCESS_KEY: test
        AWS_DEFAULT_REGION: eu-south-2
    
    steps:

      - name: Download GitHub code inside GitHub actions
        uses: actions/checkout@v3

      - name: Setup/Install Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Terraform Format Check
        run: terraform fmt -check
        working-directory: ./terraform

      - name: Terraform Validate
        run: terraform validate
        working-directory: ./terraform

      - name: Terraform Plan 
        run: terraform plan
        working-directory: ./terraform

      - name: Terraform apply 
        run: terraform apply -auto-approve
        working-directory: ./terraform

      - name: Setup/Install Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: ./application

      - name: Pylint
        run: |
          pip install pylint
          pylint app.py --fail-under=7.0
        working-directory: ./application

      - name: Run API
        run: |
          python app.py &
          sleep 3
        working-directory: ./application

      - name: List Objects S3 Bucket
        run: |
          response=$(curl -s http://localhost:8000/terraform/s3/bucket/objects)
          echo "Response: $response"
          echo $response | grep -q "OK"

      - name: Validate POST endpoint
        run: |
          response=$(curl -s -X POST http://localhost:8000/terraform/s3/bucket/objects \
            -H "Content-Type: application/json" \
            -d '{"filename": "test-file-localstack-cicd.json", "user": "pablo-github-actions"}')
          echo "Response: $response"
          echo $response | grep -q "successfully"
          
      - name: List Objects S3 Bucket after object creation
        run: |
          response=$(curl -s http://localhost:8000/terraform/s3/bucket/objects)
          echo "Response: $response"
          echo $response | grep -q "OK"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and push image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./application
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/s3-app:latest
      
      